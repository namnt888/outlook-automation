name: Mail Organizer

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  organize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run organize
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          GRAPH_TOKEN_JSON: ${{ secrets.GRAPH_TOKEN_JSON }}
